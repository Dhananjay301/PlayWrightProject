name: Run Automation Tests When Code Pushed

on:
  push:
    branches:
      - master

jobs:
  run-tests:
    name: Run Automation test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project
        run: mvn clean install DskipTests

      - name: Run Tests
        run: | 
         mvn test -Dcucumber.groups.tags="@smoke"